# CodeQL static analysis (SAST).
# NOTE: CodeQL requires GitHub Advanced Security on private/internal repos, or a
# public repository. This workflow activates automatically once the repo is
# public (CodeQL is free for public repositories). Until then its runs will fail
# at the init step — that is expected pre-launch. Triggers are scoped to
# push/schedule (not pull_request) so it never blocks PR merges.
name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # weekly, Monday 03:27 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: go.sum
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: go
          build-mode: autobuild
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:go"

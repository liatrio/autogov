# CodeQL static analysis (SAST).
# NOTE: CodeQL requires GitHub Advanced Security on private/internal repos, or a
# public repository. The analysis is gated to public repos only, so it is a
# no-op (skipped, green) until the repo is public — at which point it activates
# automatically (CodeQL is free for public repositories). It runs on pull_request
# (for SAST coverage on every change), push to main, and weekly; it is not a
# required check, so it does not block PR merges.
name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # weekly, Monday 03:27 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Gate analysis to public repos only — CodeQL fails on private/internal repos
  # without GHAS. The schedule event payload lacks repo visibility, so query the
  # API rather than reading github.event.repository (keeps the gate correct
  # across push, schedule, and branch_protection_rule).
  check-visibility:
    name: Check repository visibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      public: ${{ steps.visibility.outputs.public }}
    steps:
      - id: visibility
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          visibility="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.visibility')"
          echo "Repository visibility: ${visibility}"
          if [ "${visibility}" = "public" ]; then
            echo "public=true" >> "${GITHUB_OUTPUT}"
          else
            echo "CodeQL skipped: repository is '${visibility}', not public." >> "${GITHUB_STEP_SUMMARY}"
            echo "public=false" >> "${GITHUB_OUTPUT}"
          fi

  analyze:
    name: Analyze (Go)
    needs: check-visibility
    if: needs.check-visibility.outputs.public == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          build-mode: autobuild
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:go"

name: Build, Attest, and Release

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - catalog-info.yaml
      - renovate.json
      - docs/**
      - .github/dependabot.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-attest-blob.yaml@90a173de385670778a6c8800e3ab31ce923fc7b8 # v0.14.1
    secrets: inherit
    with:
      subject-path: autogov-verify

  verify-blob:
    needs: [attest-blob]
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-verify.yaml@90a173de385670778a6c8800e3ab31ce923fc7b8 # v0.14.1
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-attest-blob.yaml@6ec9a792694dbd3d312bcad8136db0586d45b822 # v0.14.0
      vuln-threshold-critical: '0'
      vuln-threshold-high: '-1'
      vuln-threshold-medium: '-1'
      vuln-threshold-low: '-1'

  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [verify-blob]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      VSA_FOLDER: ./vsa
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: 1.25.5
          cache: true
          cache-dependency-path: go.sum
      - name: Run go-semantic-release
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        id: go-semantic-release
        with:
          github-token: ${{ github.token }}
          changelog-generator-opt: emojis=true
          allow-initial-development-versions: true
          ghr: false
      - name: Install Task
        if: steps.go-semantic-release.outputs.version != ''
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build binary
        if: steps.go-semantic-release.outputs.version != ''
        run: task build
        env:
          VERSION: v${{ steps.go-semantic-release.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
      - name: Download VSA artifact
        if: steps.go-semantic-release.outputs.version != ''
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ env.VSA_FOLDER }}
      - name: Upload binary and VSA as release assets
        if: steps.go-semantic-release.outputs.version != ''
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            bin/autogov-verify
            ${{ env.VSA_FOLDER }}/*
          tag_name: v${{ steps.go-semantic-release.outputs.version }}
          token: ${{ github.token }}

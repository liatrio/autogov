name: Build, Attest, and Release

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - renovate.json
      - docs/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@dc57f72515396f86fe248e66951822dccb8ad785 # v0.21.3
    secrets: inherit
    with:
      subject-path: autogov

  verify-blob:
    needs: [attest-blob]
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-verify.yaml@dc57f72515396f86fe248e66951822dccb8ad785 # v0.21.3
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
      vuln-threshold-critical: '0'
      vuln-threshold-high: '-1'
      vuln-threshold-medium: '-1'
      vuln-threshold-low: '-1'

  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [verify-blob]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write # federate the octo-sts release token
    steps:
      # build artifacts go under $RUNNER_TEMP (outside the repo tree) so release
      # cut's clean-tree check (go-git Status().IsClean(), which counts untracked
      # files) passes — plan.json + the downloaded VSA must not dirty the worktree.
      # runner.temp is NOT available in job-level env, so the path is referenced
      # per step: ${{ runner.temp }} in `with:`, $RUNNER_TEMP in `run:`.
      # Full history is required: the released `autogov release plan` CLI command
      # discovers the latest tag and walks commits with local go-git (its GitHub
      # API path is not wired into the standalone `plan` command), so a shallow
      # clone would not see prior tags. `release cut` itself can use the API, but
      # the `plan` step that sources VERSION cannot.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: go.sum
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install released autogov CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v0.23.0 --repo liatrio/autogov --pattern autogov --output autogov
          chmod +x autogov
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Plan release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: autogov release plan -o json > "$RUNNER_TEMP/plan.json"
      - name: Build binary
        # next_version from the plan already carries the `v` prefix (Version.String()),
        # so it is used verbatim — do not add another `v`.
        run: |
          VERSION="$(jq -r .next_version "$RUNNER_TEMP/plan.json")" task build
        env:
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
      - name: Download VSA artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ runner.temp }}/vsa
      - name: Resolve VSA asset path
        id: vsa
        run: |
          vsa="$(find "$RUNNER_TEMP/vsa" -maxdepth 1 -name '*.json' | head -1)"
          if [ -z "$vsa" ]; then
            echo "no VSA .json found in $RUNNER_TEMP/vsa" >&2
            exit 1
          fi
          echo "path=$vsa" >> "$GITHUB_OUTPUT"
      # release cut --publish creates a chore(release) commit (with [skip ci], so it
      # does not re-trigger this workflow) and fast-forwards refs/heads/main. main is
      # governed by the "main protection" ruleset; the octo-sts release-ops token
      # below is a bypass actor (governance in place: autogov is in
      # release-ops.sts.yaml and octo-sts is on the ruleset bypass), so the push is
      # accepted.
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts-release
        with:
          scope: liatrio
          identity: release-ops
      - name: Cut release and upload assets
        env:
          GH_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
          GITHUB_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
        run: |
          autogov release cut \
            --plan-file "$RUNNER_TEMP/plan.json" \
            --asset bin/autogov \
            --asset "${{ steps.vsa.outputs.path }}" \
            --publish

name: Build, Attest, and Release

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - renovate.json
      - docs/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0
    secrets: inherit
    with:
      subject-path: autogov

  verify-blob:
    needs: [attest-blob]
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-verify.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0
      vuln-threshold-critical: '0'
      vuln-threshold-high: '0'
      vuln-threshold-medium: '-1'
      vuln-threshold-low: '-1'

  # additive image publish: builds the CLI into a signed multi-arch OCI image with
  # ko. it does NOT gate the blob attest/verify/release jobs above (no `needs`).
  # ko builds on every push to validate the config + ldflags, but only PUSHES on
  # main or a tag (`should-push`) so feature branches don't pollute ghcr. the
  # pushed digest is attested with push-to-registry, same pattern as
  # rw-attest-image.yaml.
  ko-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    env:
      KO_DOCKER_REPO: ghcr.io/liatrio/autogov
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          version: v0.18.1
      - name: Derive build metadata
        # mirror Taskfile.yml: same version/commit/date/opa so the ko image and
        # `task build` embed byte-identical ldflags. SOURCE_DATE_EPOCH (commit
        # time) zeroes the image timestamp for reproducibility.
        run: |
          {
            echo "VERSION=$(git describe --tags --always --dirty)"
            echo "COMMIT=$(git rev-parse HEAD)"
            echo "DATE=$(git show -s --format=%cI HEAD)"
            echo "OPA_VERSION=$(go list -m github.com/open-policy-agent/opa | awk '{print $2}')"
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
          } >> "$GITHUB_ENV"
      - name: Gate push to main/tag
        id: gate
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ] || [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            echo "should-push=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-push=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to GitHub Container Registry
        if: ${{ steps.gate.outputs.should-push == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: ko build
        id: build
        # --bare publishes exactly at KO_DOCKER_REPO; --push is gated so branches
        # only validate the build. --image-refs captures the pushed ref@digest.
        run: |
          ko build . \
            --bare \
            --platform=linux/amd64,linux/arm64 \
            --push=${{ steps.gate.outputs.should-push }} \
            --image-refs "$RUNNER_TEMP/image-refs.txt"
          if [ "${{ steps.gate.outputs.should-push }}" = "true" ]; then
            ref="$(head -1 "$RUNNER_TEMP/image-refs.txt")"
            echo "digest=${ref#*@}" >> "$GITHUB_OUTPUT"
          fi
      - name: Attest image provenance
        if: ${{ steps.gate.outputs.should-push == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/liatrio/autogov
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [verify-blob]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write # federate the octo-sts release token
    steps:
      # downloaded artifacts go under $RUNNER_TEMP (outside the repo tree) so release
      # cut's clean-tree check (go-git Status().IsClean(), which counts untracked
      # files) passes — plan.json, the attested binary, and the VSA must not dirty
      # the worktree. runner.temp is NOT available in job-level env, so the path is
      # referenced per step: ${{ runner.temp }} in `with:`, $RUNNER_TEMP in `run:`.
      # Full history is required: the released `autogov release plan` CLI command
      # discovers the latest tag and walks commits with local go-git (its GitHub
      # API path is not wired into the standalone `plan` command), so a shallow
      # clone would not see prior tags. `release cut` itself can use the API, but
      # the `plan` step that computes the next version cannot.
      # The released asset is the attested blob-build-artifact-high-perms binary
      # (not a rebuild), so its digest carries the attestations. No Go toolchain is
      # needed here: plan and cut run the downloaded autogov CLI.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install released autogov CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v0.23.0 --repo liatrio/autogov --pattern autogov --output autogov
          chmod +x autogov
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Plan release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: autogov release plan -o json > "$RUNNER_TEMP/plan.json"
      - name: Download attested binary
        # the attested + verified binary from attest-blob (not a rebuild)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: blob-build-artifact-high-perms
          path: ${{ runner.temp }}/attested
      - name: Download VSA artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ runner.temp }}/vsa
      - name: Resolve VSA asset path
        id: vsa
        run: |
          vsa="$(find "$RUNNER_TEMP/vsa" -maxdepth 1 -name '*.json' | head -1)"
          if [ -z "$vsa" ]; then
            echo "no VSA .json found in $RUNNER_TEMP/vsa" >&2
            exit 1
          fi
          echo "path=$vsa" >> "$GITHUB_OUTPUT"
      - name: Download build-provenance attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: blob-build-provenance-attestation-high-perms
          path: ${{ runner.temp }}/provenance
      - name: Resolve provenance asset path
        # attach the SLSA build-provenance bundle as *.intoto.jsonl so release
        # consumers (and OpenSSF Scorecard's Signed-Releases check) find detached
        # provenance on the release, not only in the registry/transparency log.
        id: provenance
        run: |
          prov="$(find "$RUNNER_TEMP/provenance" -maxdepth 1 -name '*.jsonl' | head -1)"
          if [ -z "$prov" ]; then
            echo "no provenance .jsonl found in $RUNNER_TEMP/provenance" >&2
            exit 1
          fi
          cp "$prov" "$RUNNER_TEMP/autogov.intoto.jsonl"
          echo "path=$RUNNER_TEMP/autogov.intoto.jsonl" >> "$GITHUB_OUTPUT"
      # release cut --publish creates a chore(release) commit (with [skip ci], so it
      # does not re-trigger this workflow) and fast-forwards refs/heads/main. main is
      # governed by the "main protection" ruleset; the octo-sts release-ops token
      # below is a bypass actor (governance in place: autogov is in
      # release-ops.sts.yaml and octo-sts is on the ruleset bypass), so the push is
      # accepted.
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts-release
        with:
          scope: liatrio
          identity: release-ops
      - name: Cut release and upload assets
        env:
          GH_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
          GITHUB_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
        run: |
          autogov release cut \
            --plan-file "$RUNNER_TEMP/plan.json" \
            --asset "$RUNNER_TEMP/attested/autogov" \
            --asset "${{ steps.vsa.outputs.path }}" \
            --asset "${{ steps.provenance.outputs.path }}" \
            --publish

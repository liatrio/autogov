name: Build, Attest, and Release

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - renovate.json
      - docs/**

concurrency:
  # never cancel a release mid-publish; serialize per ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@a35a71dae5b9ec8f60a92e7b9ed0ee551acce8ef # v1.1.1
    secrets: inherit
    with:
      subject-path: autogov

  verify-blob:
    needs: [attest-blob]
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-verify.yaml@a35a71dae5b9ec8f60a92e7b9ed0ee551acce8ef # v1.1.1
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob.yaml@a35a71dae5b9ec8f60a92e7b9ed0ee551acce8ef # v1.1.1
      # autogov's own release claims Source L3 (enforced controls), not L4 (review),
      # so it self-verifies at min_approvals 0; the published bundle stays strict. It
      # also declares its two narrow ruleset bypass actors (the release-bot Integration
      # and the sole-maintainer User) so self-verify stays internally consistent; the
      # source-posture gate remains inert (require_min_source_posture unset).
      policy-data-overlay: '{"source_review_thresholds":{"min_approvals":0},"source_level_thresholds":{"allowed_bypass_actors":["Integration:801323","User:138915"]}}'
      # a FAILED self-verify fails verify-blob, skipping the release job.
      allow-failed-vsa: false
      vuln-threshold-critical: '0'
      vuln-threshold-high: '0'
      vuln-threshold-medium: '-1'
      vuln-threshold-low: '-1'

  # additive signed multi-arch OCI image (ko). does NOT gate the blob jobs (no
  # `needs`); builds on every push to validate, but pushes + attests only on main.
  ko-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    env:
      KO_DOCKER_REPO: ghcr.io/liatrio/autogov
    steps:
      - name: Fail if Runner is self-hosted
        # ko-image attests build provenance; SLSA Build L3 requires an isolated
        # github-hosted runner, so refuse to attest from a self-hosted one
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10
        with:
          version: v0.18.1
      - name: Derive build metadata
        # mirror Taskfile.yml ldflags so the ko image matches `task build`;
        # SOURCE_DATE_EPOCH pins the image timestamp to the commit (reproducible).
        run: |
          {
            echo "VERSION=$(git describe --tags --always --dirty)"
            echo "COMMIT=$(git rev-parse HEAD)"
            echo "DATE=$(git show -s --format=%cI HEAD)"
            echo "OPA_VERSION=$(go list -m github.com/open-policy-agent/opa | awk '{print $2}')"
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
          } >> "$GITHUB_ENV"
      - name: Gate push to main
        id: gate
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "should-push=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-push=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to GitHub Container Registry
        if: ${{ steps.gate.outputs.should-push == 'true' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: ko build
        id: build
        run: |
          ko build . \
            --bare \
            --platform=linux/amd64,linux/arm64 \
            --push=${{ steps.gate.outputs.should-push }} \
            --image-refs "$RUNNER_TEMP/image-refs.txt"
          if [ "${{ steps.gate.outputs.should-push }}" = "true" ]; then
            ref="$(head -1 "$RUNNER_TEMP/image-refs.txt")"
            echo "digest=${ref#*@}" >> "$GITHUB_OUTPUT"
          fi
      - name: Attest image provenance
        if: ${{ steps.gate.outputs.should-push == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/liatrio/autogov
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [verify-blob]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write # federate the octo-sts release token
    steps:
      # self-release: the just-attested binary is the cutter (+ the published asset).
      # fetch-depth:0 for `release plan`'s local go-git; artifacts stay under
      # $RUNNER_TEMP (off the worktree) so `release cut`'s clean-tree check holds.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download attested binary (cutter + released asset)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: blob-build-artifact-high-perms
          path: ${{ runner.temp }}/attested
      - name: Use the attested binary as the cutter
        run: |
          chmod +x "$RUNNER_TEMP/attested/autogov"
          echo "$RUNNER_TEMP/attested" >> "$GITHUB_PATH"
      - name: Plan release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: autogov release plan -o json > "$RUNNER_TEMP/plan.json"
      - name: Download VSA artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ runner.temp }}/vsa
      - name: Resolve VSA asset path
        id: vsa
        run: |
          vsa="$(find "$RUNNER_TEMP/vsa" -maxdepth 1 -name '*.json' | head -1)"
          if [ -z "$vsa" ]; then
            echo "no VSA .json found in $RUNNER_TEMP/vsa" >&2
            exit 1
          fi
          echo "path=$vsa" >> "$GITHUB_OUTPUT"
      - name: Download build-provenance attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: blob-build-provenance-attestation-high-perms
          path: ${{ runner.temp }}/provenance
      - name: Resolve provenance asset path
        # attach build-provenance as *.intoto.jsonl for OpenSSF Scorecard's
        # Signed-Releases check + offline consumers (not only the registry/tlog).
        id: provenance
        run: |
          prov="$(find "$RUNNER_TEMP/provenance" -maxdepth 1 -name '*.jsonl' | head -1)"
          if [ -z "$prov" ]; then
            echo "no provenance .jsonl found in $RUNNER_TEMP/provenance" >&2
            exit 1
          fi
          cp "$prov" "$RUNNER_TEMP/autogov.intoto.jsonl"
          echo "path=$RUNNER_TEMP/autogov.intoto.jsonl" >> "$GITHUB_OUTPUT"
      - name: Download all attestation bundles
        # the full bundle (build-provenance + metadata + sbom + dep-scan +
        # source-review) is what an offline verifier re-evaluates against policy
        # (autogov offline --attestations); the single-statement provenance asset
        # above stays for OpenSSF Scorecard's Signed-Releases check.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-*-attestation-high-perms
          path: ${{ runner.temp }}/attestations
      - name: Assemble full attestation bundle asset
        id: bundle
        run: |
          out="$RUNNER_TEMP/autogov.attestations.intoto.jsonl"
          : > "$out"
          count=0
          while IFS= read -r f; do
            cat "$f" >> "$out"
            # keep bundles newline-delimited even if a file lacks a trailing LF
            [ -n "$(tail -c1 "$f")" ] && echo >> "$out"
            count=$((count + 1))
          done < <(find "$RUNNER_TEMP/attestations" -type f -name '*.jsonl' | sort)
          if [ "$count" -eq 0 ]; then
            echo "no attestation .jsonl bundles found under $RUNNER_TEMP/attestations" >&2
            exit 1
          fi
          echo "assembled $count attestation bundles into $out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
      # the release-cut push to main needs the octo-sts release-ops bypass actor
      # (github.token can't bypass the ruleset).
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts-release
        with:
          scope: liatrio
          identity: release-ops
      - name: Cut release and upload assets
        env:
          GH_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
          GITHUB_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
        run: |
          autogov release cut \
            --plan-file "$RUNNER_TEMP/plan.json" \
            --asset "$RUNNER_TEMP/attested/autogov" \
            --asset "${{ steps.vsa.outputs.path }}" \
            --asset "${{ steps.provenance.outputs.path }}" \
            --asset "${{ steps.bundle.outputs.path }}" \
            --publish

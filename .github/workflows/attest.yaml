name: Build, Attest, and Release

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - catalog-info.yaml
      - renovate.json
      - docs/**
      - .github/dependabot.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-attest-blob.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
    secrets: inherit
    with:
      subject-path: autogov

  verify-blob:
    needs: [attest-blob]
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-verify.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-attest-blob.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
      vuln-threshold-critical: '0'
      vuln-threshold-high: '-1'
      vuln-threshold-medium: '-1'
      vuln-threshold-low: '-1'

  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [verify-blob]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      VSA_FOLDER: ./vsa
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: go.sum
      - name: Run go-semantic-release
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        id: go-semantic-release
        with:
          github-token: ${{ github.token }}
          changelog-generator-opt: emojis=true
          allow-initial-development-versions: true
          ghr: false
      - name: Install Task
        if: steps.go-semantic-release.outputs.version != ''
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build binary
        if: steps.go-semantic-release.outputs.version != ''
        run: task build
        env:
          VERSION: v${{ steps.go-semantic-release.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
      - name: Download VSA artifact
        if: steps.go-semantic-release.outputs.version != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ env.VSA_FOLDER }}
      - name: Upload binary and VSA as release assets
        if: steps.go-semantic-release.outputs.version != ''
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            bin/autogov
            ${{ env.VSA_FOLDER }}/*
          tag_name: v${{ steps.go-semantic-release.outputs.version }}
          token: ${{ github.token }}

name: Build Blob Composite Action

description: >-
  Builds the autogov Go binary for attestation workflows.
  This action is called by rw-*-attest-blob.yaml workflows.

inputs:
  go-version:
    description: 'Go version to use for building (defaults to the go.mod toolchain)'
    required: false
    default: ''

outputs:
  binary-path:
    description: 'Path to the built binary'
    value: ${{ steps.build.outputs.binary-path }}
  version:
    description: 'Version of the built binary'
    value: ${{ steps.build.outputs.version }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Install Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        version: 3.x
        repo-token: ${{ github.token }}
    - name: Build Binary
      id: build
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # build via the Taskfile — the single source of truth for ldflags
        # (version/commit/date/opa). date derives from the commit, so the build is
        # reproducible. output to the repo root as `autogov` (the attestation subject).
        version_out="$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')"
        task build BINARY_DIR=.
        # when a release is due, stamp the accurate next tag: the dry-run plan computes
        # it via the GitHub API before the tag exists (no full clone needed). fail-safe
        # — any error keeps the git-describe version from the build above.
        next="$(./autogov release plan --mode api -o json 2>/dev/null | jq -r 'select(.release_needed) | .next_version // empty')"
        if [ -n "$next" ]; then
          echo "stamping release version: $next"
          VERSION="$next" task build BINARY_DIR=.
          version_out="$next"
        fi
        echo "binary-path=autogov" >> "$GITHUB_OUTPUT"
        echo "version=$version_out" >> "$GITHUB_OUTPUT"
        ls -la autogov
        ./autogov version || true

version: '3'

vars:
  BINARY_NAME: autogov
  BINARY_DIR: bin
  VERSION:
    sh: echo "${VERSION:-$(git describe --tags --always --dirty)}"
  COMMIT:
    sh: echo "${COMMIT:-$(git rev-parse HEAD 2>/dev/null || echo 'none')}"
  DATE:
    # derive from the commit (reproducible) so rebuilding the same commit is
    # byte-identical; fall back to now outside a git checkout. override with DATE=.
    sh: echo "${DATE:-$(git show -s --format=%cI HEAD 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%SZ)}"
  OPA_VERSION:
    sh: echo "${OPA_VERSION:-$(go list -m github.com/open-policy-agent/opa 2>/dev/null | awk '{print $2}' || echo 'unknown')}"
  LDFLAGS: -s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}} -X main.OpaVersion={{.OPA_VERSION}}

tasks:
  default:
    desc: Run verify and build (default)
    cmds:
      - task: verify
      - task: build

  build:
    desc: Build the binary
    cmds:
      - echo "Building {{.BINARY_NAME}} version {{.VERSION}}"
      - mkdir -p {{.BINARY_DIR}}
      - CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BINARY_DIR}}/{{.BINARY_NAME}} .
    generates:
      - "{{.BINARY_DIR}}/{{.BINARY_NAME}}"

  test:
    desc: Run tests with coverage
    cmds:
      - echo "Running tests..."
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
    generates:
      - coverage.out

  lint:
    desc: Run linter
    cmds:
      - echo "Running linter..."
      - golangci-lint run

  format:
    desc: Format code
    cmds:
      - echo "Formatting code..."
      - gofmt -w .

  clean:
    desc: Clean build artifacts
    cmds:
      - echo "Cleaning up..."
      - rm -rf {{.BINARY_DIR}} coverage.out

  install:
    desc: Install binary to /usr/local/bin
    deps:
      - build
    cmds:
      - echo "Installing {{.BINARY_NAME}} to /usr/local/bin"
      - sudo cp {{.BINARY_DIR}}/{{.BINARY_NAME}} /usr/local/bin/

  verify:
    desc: Run format, lint, and test
    cmds:
      - task: format
      - task: lint
      - task: test

  vendor-public-trusted-root:
    desc: Re-vendor the embedded public-good Sigstore trusted root from the Sigstore TUF repo
    cmds:
      - go run ./tools/update-trusted-roots
